 <!DOCTYPE html>
<html>
<head>
  <title>Loan Application</title>
  <style>
    body { font-family: Arial; max-width: 600px; margin: auto; padding: 20px; }
    label { font-weight: bold; display: block; margin-top: 10px; }
    input, select { width: 100%; padding: 8px; margin-top: 5px; }
    #submitBtn { padding: 10px 20px; margin-top: 20px; }
    .note { font-size: 0.9em; color: gray; }
    #successMessage { display: none; background: #d4edda; color: #155724; padding: 15px; margin-top: 20px; border-radius: 5px; }
  </style>
</head>
<body>

<h2>Loan Application Form</h2>
<p class="note">Fields marked with * are required.</p>

<form id="form">

<label>Name*:</label>
<input type="text" id="name" required placeholder="Your full name">

<label>Email*:</label>
<input type="email" id="email" required placeholder="Your email for confirmation">

<label>Phone*:</label>
<input type="tel" id="phone" required pattern="[0-9]{10}" placeholder="10-digit number">

<label>Address:</label>
<input type="text" id="address" placeholder="Your address">

<label>Loan Type*:</label>
<select id="loanType" required>
  <option value="">Select</option>
  <option>Home Loan</option>
  <option>Personal Loan</option>
  <option>Business Loan</option>
  <option>Property Loan</option>
  <option>Vehicle Loan</option>
</select>

<!-- Vehicle Type -->
<div id="vehicleSection" style="display:none;">
  <label>Vehicle Type*:</label>
  <select id="vehicleType">
    <option value="">Select</option>
    <option>New</option>
    <option>Used</option>
  </select>
</div>

<label>Loan Amount:</label>
<input type="number" id="amount" min="1000" placeholder="Enter amount">

<label>Upload Documents (Max 5, PDF/JPG/PNG)</label>
<input type="file" id="files" multiple accept=".pdf,.jpg,.png">

<button type="submit" id="submitBtn">Submit</button>

</form>

<div id="successMessage">
  <h3>Thank you!</h3>
  <p>Your loan application has been submitted successfully. You will receive a confirmation email shortly.</p>
</div>

<script>
// Show/hide vehicle type
document.getElementById("loanType").addEventListener("change", function() {
  const vehicleSection = document.getElementById("vehicleSection");
  const vehicleType = document.getElementById("vehicleType");
  if (this.value === "Vehicle Loan") {
    vehicleSection.style.display = "block";
  } else {
    vehicleSection.style.display = "none";
    vehicleType.value = "";
  }
});

// Submit form
document.getElementById("form").addEventListener("submit", async function(e){
  e.preventDefault();
  const btn = document.getElementById("submitBtn");
  btn.disabled = true;
  btn.innerText = "Submitting...";

  const files = document.getElementById("files").files;
  if (files.length > 5) {
    alert("Maximum 5 files allowed");
    btn.disabled = false;
    btn.innerText = "Submit";
    return;
  }

  const data = {
    name: document.getElementById("name").value.trim(),
    email: document.getElementById("email").value.trim(),
    phone: document.getElementById("phone").value.trim(),
    address: document.getElementById("address").value.trim(),
    loanType: document.getElementById("loanType").value,
    vehicleType: document.getElementById("vehicleType").value,
    amount: Number(document.getElementById("amount").value),
    files: []
  };

  try {
    for (let i = 0; i < files.length; i++) {
      const file = files[i];
      if (file.size > 5*1024*1024) {
        alert(`${file.name} is too large (max 5MB)`);
        btn.disabled = false;
        btn.innerText = "Submit";
        return;
      }
      const base64 = await toBase64(file);
      data.files.push({
        name: file.name,
        type: file.type,
        data: base64.split(",")[1]
      });
    }

    const response = await fetch("https://script.google.com/macros/s/AKfycbzz0KEdxZhuzrkhEY-_d5qNTHJRoj4_aJcd1kDayNlS4pIkIsXixdPP9-cxNX3eWHjU/exec", {
      method: "POST",
      body: JSON.stringify(data)
    });

    if (response.ok) {
      // Show success message
      document.getElementById("form").style.display = "none";
      document.getElementById("successMessage").style.display = "block";

      // Optionally: trigger email from Google Apps Script
      // Backend script should handle sending email using data.email

    } else {
      throw new Error("Server error: " + response.status);
    }
  } catch (err) {
    console.error(err);
    alert("Error submitting form: " + err.message);
    btn.disabled = false;
    btn.innerText = "Submit";
  }
});

function toBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.readAsDataURL(file);
    reader.onload = () => resolve(reader.result);
    reader.onerror = error => reject(error);
  });
}
</script>

</body>
</html>
